<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>TMDB Thumbnail Generator</title>

    <link rel="stylesheet" href="style.css">
</head>
<body>

<div class="container">

    <header>
        <h1>🎬 TMDB Thumbnail Generator</h1>
        <p>Create 1280×720 thumbnails from TMDB posters</p>
    </header>

    <!-- Search -->
    <section class="search-section">

        <div class="search-bar">

            <input
                type="text"
                id="searchInput"
                placeholder="Search Movie or TV Show...">

            <button id="searchBtn">
                Search
            </button>

        </div>

    </section>

    <!-- Search Results -->
    <section>

        <div id="results" class="results-grid">

        </div>

    </section>

    <!-- TV Options -->

    <section id="tvSection" class="hidden">

        <div class="option">

            <label>Season</label>

            <select id="seasonSelect">

                <option value="">
                    Select Season
                </option>

            </select>

        </div>

        <div class="option">

            <label>Episode</label>

            <input
                type="number"
                id="episodeInput"
                min="1"
                value="1">

        </div>

    </section>

    <!-- Preview -->

    <section class="preview">

        <canvas
            id="canvas"
            width="1280"
            height="720">
        </canvas>

    </section>

    <!-- Buttons -->

    <section class="buttons">

        <button id="generateBtn">
            🖼 Generate
        </button>

        <button id="downloadBtn">
            ⬇ Download PNG
        </button>

        <button id="telegramBtn">
            🤖 Upload to Telegram
        </button>

    </section>

    <!-- Caption -->

    <section>

        <h2>Caption</h2>

        <textarea
            id="caption"
            rows="10"
            readonly></textarea>

    </section>

    <!-- Status -->

    <section>

        <div id="status"></div>

    </section>
        <!-- Loading Overlay -->
    <div id="loading" class="loading hidden">
        <div class="spinner"></div>
        <p>Please wait...</p>
    </div>

    <!-- Hidden Image -->
    <img id="hiddenPoster" crossorigin="anonymous" style="display:none;">

</div>

<!-- ========= Configuration ========= -->

<script>

const CONFIG = {

    // TMDB API Key
    TMDB_API_KEY: "YOUR_TMDB_API_KEY",

    // Cloudflare Worker URL
    // Example:
    // https://your-worker.workers.dev/upload
    WORKER_URL: "",

    CANVAS_WIDTH: 1280,

    CANVAS_HEIGHT: 720

};

let selectedItem = null;

let selectedSeason = null;

let generatedBlob = null;

let currentPoster = "";

let imdbId = "";

let genres = "";

let plot = "";

let releaseYear = "";

</script>

<!-- Main JavaScript -->
<script src="app.js"></script>

</body>
</html>
